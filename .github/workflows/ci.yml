name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24.x'

jobs:
  # 35_Deployment.md § 3: lint + typecheck + build zijn blokkerend op elke PR.
  checks:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - name: Dependency-scan (NFR-302, 41_CodingStandards.md § 16)
        # audit-level=critical: er is een bekende moderate advisory in Next.js'
        # eigen gebundelde postcss-dependency waarvan de "fix" Next.js zou
        # downgraden naar een oude major-versie (zie Sprint 1-rapport). Bewust
        # niet geforceerd; critical blokkeert nog wel altijd.
        run: npm audit --audit-level=critical
      - name: Build (met placeholder-envs, geen live Supabase nodig voor een build)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
          NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000

  # 31_Testplan.md § 1: unit-tests hebben geen externe afhankelijkheden.
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm test

  # 31_Testplan.md § 4: verplichte negatieve RLS-tests tegen een echte lokale
  # Supabase-instantie (NFR-301) + onboard_company()-contract.
  integration-tests:
    name: Integration tests (RLS + onboard_company)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase start --exclude imgproxy,pgadmin-schema-diff,pgadmin,studio,logflare,vector
      - name: Write .env.local from supabase start output
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:54321" >> .env.local
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(supabase status -o json | jq -r .ANON_KEY)" >> .env.local
          echo "NEXT_PUBLIC_SITE_URL=http://127.0.0.1:3000" >> .env.local
      - run: npm run test:integration

  # 31_Testplan.md § 2: Sprint 1-deel van E2E-1 (registreren → bevestigen →
  # onboarden → dashboard), tegen een echte lokale Supabase-instantie + Next.js.
  e2e-tests:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase start --exclude imgproxy,pgadmin-schema-diff,pgadmin,studio,logflare,vector
      - name: Write .env.local from supabase start output
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:54321" >> .env.local
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(supabase status -o json | jq -r .ANON_KEY)" >> .env.local
          echo "NEXT_PUBLIC_SITE_URL=http://127.0.0.1:3000" >> .env.local
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
